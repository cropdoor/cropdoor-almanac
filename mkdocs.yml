site_name: CropDoor Almanac
site_description: Architecture and reference docs for the CropDoor platform — the farm-to-buyer marketplace.
site_url: https://almanac.cropdoor.com
site_author: CropDoor Team
copyright: Copyright &copy; 2026 CropDoor

repo_url: https://github.com/cropdoor/cropdoor-almanac
repo_name: cropdoor/cropdoor-almanac
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    # Both schemes use `custom` so the brand palette lives entirely in
    # stylesheets/extra.css (CropDoor design system: forest + lime + sand).
    # Light is the hard default — loads regardless of OS preference.
    # Dark is opt-in via the toggle button; Material remembers the choice
    # in localStorage so users don't have to flip on every visit.
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  # AES-encrypts all page content at build time. Site is rendered as
  # ciphertext; entering the global password derives the AES key in the
  # browser and decrypts in place. Shared-credential model — appropriate
  # for an internal-team-only docs gate, NOT for adversarial protection.
  #
  # Rotation: change `global_password` and push. Old localStorage entries
  # fail to decrypt; users get prompted again. No DB or server involved.
  - encryptcontent:
      global_password: 'almanac@cropdoor'
      title_prefix: ''
      summary: 'CropDoor Almanac — internal docs. Sign in to continue.'
      placeholder: 'Password'
      password_button: True
      password_button_text: 'Sign in'
      decryption_failure_message: 'Wrong password — try again.'
      encryption_info_message: ''
      remember_password: True
      session_storage: False

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Architecture:
      - architecture/index.md
  - Security:
      - security/index.md
  - Authentication:
      - auth/index.md
  - RBAC & Permissions:
      - rbac/index.md
  - Audit Logging:
      - audit/index.md
  - Domain:
      - domain/index.md
  - Payments:
      - payments/index.md
  - Notifications:
      - notifications/index.md
  - Operations:
      - operations/index.md
  - Contributing:
      - contributing/index.md
